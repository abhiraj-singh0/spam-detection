<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Analysis Engine</title>
    <!-- Importing professional fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Strictly Serious Dark Theme Palette */
            --bg-base: #0B0F19; /* Deep dark background */
            --bg-surface: #131B2C; /* Slightly lighter for cards/sidebar */
            --bg-surface-hover: #1E293B;
            --border-color: #2A374A;
            --text-primary: #E2E8F0;
            --text-secondary: #94A3B8;
            --accent-primary: #3B82F6; /* Professional blue */
            --accent-hover: #2563EB;
            --status-clean-bg: rgba(16, 185, 129, 0.1);
            --status-clean-text: #34D399; /* Emerald green */
            
            --font-ui: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        aside {
            width: 260px;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .logo-container {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background-color: var(--accent-primary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text {
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        nav {
            padding: 16px 0;
            flex: 1;
        }

        .nav-item {
            display: block;
            padding: 12px 24px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--bg-surface-hover);
            color: var(--text-primary);
            border-left: 3px solid var(--accent-primary);
        }

        .nav-item:not(.active) {
            border-left: 3px solid transparent;
        }

        .nav-footer {
            padding: 16px 0;
            border-top: 1px solid var(--border-color);
        }

        /* Main Content Area */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background: radial-gradient(circle at top right, #131B2C 0%, #0B0F19 60%);
        }

        .analysis-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-body {
            padding: 24px;
        }

        /* Form & Input Styling */
        textarea {
            width: 100%;
            height: 200px;
            background-color: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.875rem;
            resize: none;
            transition: border-color 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        textarea::placeholder {
            color: #475569;
        }

        /* Button Styling */
        .btn-execute {
            margin-top: 24px;
            width: 100%;
            background-color: var(--accent-primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn-execute:hover {
            background-color: var(--accent-hover);
        }

        /* Status Footer */
        .card-footer {
            padding: 16px 24px;
            background-color: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        .status-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-badge {
            background-color: var(--status-clean-bg);
            color: var(--status-clean-text);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            background-color: var(--status-clean-text);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--status-clean-text);
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside>
        <div class="logo-container">
            <div class="logo-icon">
                <!-- Simple SVG Icon representing scanning/security -->
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
            <span class="logo-text">Analysis Engine</span>
        </div>
        <nav>
            <a href="#" class="nav-item active">Dashboard</a>
            <a href="#" class="nav-item">Analysis History</a>
            <a href="#" class="nav-item">Settings</a>
        </nav>
        <div class="nav-footer">
            <a href="#" class="nav-item" style="color: #EF4444;">Log Out</a>
        </div>
    </aside>

    <!-- Main Workspace -->
    <main>
        <div class="analysis-card">
            <div class="card-header">
                <span class="card-title">Message Payload Inspector</span>
            </div>
            
            <div class="card-body">
                <textarea placeholder="Paste raw message payload here for heuristic and structural analysis..."></textarea>
                <button class="btn-execute">Execute Analysis</button>
            </div>
            
            <div class="card-footer">
                <span class="status-label">System Status</span>
                <div class="status-badge">
                    <div class="status-indicator"></div>
                    STATUS: CLEAN
                </div>
            </div>
        </div>
    </main>

</body>
</html>
