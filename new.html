<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpamDetection Landing Page</title>
    <style>
        /* CSS Reset & Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Simulating the dark blue radial gradient background */
            background: radial-gradient(circle at 50% 50%, #1e2538 0%, #0d111a 80%, #090c13 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Navigation Bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 8%;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #b0b8c1;
            font-size: 0.95rem;
            font-weight: 400;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: #ffffff;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        /* Buttons */
        .btn {
            text-decoration: none;
            padding: 0.55rem 1.2rem;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-outline {
            color: #4a8cf8;
            background: transparent;
            border: 1px solid #4a8cf8;
            box-shadow: inset 0 0 10px rgba(74, 140, 248, 0.1);
        }

        .btn-outline:hover {
            background: rgba(74, 140, 248, 0.1);
        }

        .btn-primary {
            background: #2b70fc;
            color: #ffffff;
            border: 1px solid #2b70fc;
            box-shadow: 0 0 15px rgba(43, 112, 252, 0.5);
        }

        .btn-primary:hover {
            box-shadow: 0 0 25px rgba(43, 112, 252, 0.7);
        }

        /* Hero Section */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4rem 8%;
            flex: 1;
        }

        .hero-content {
            max-width: 55%;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .hero-content p {
            color: #a3aeb8;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
        }

        .hero-image-container {
            width: 40%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        /* Image Styling */
        .hero-image-container img {
            max-width: 100%;
            height: auto;
            /* Adds a slight glow behind the shield graphic */
            filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.15)); 
        }

        /* Responsive Design tweaks */
        @media (max-width: 968px) {
            .hero {
                flex-direction: column;
                text-align: center;
                gap: 4rem;
            }
            .hero-content {
                max-width: 100%;
            }
            .hero-buttons {
                justify-content: center;
            }
            .nav-links {
                display: none; /* Simplifies navbar on smaller screens */
            }
            .hero-image-container {
                width: 70%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">SpamDetection</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="nav-buttons">
            <a href="#" class="btn btn-outline">Login</a>
            <a href="#" class="btn btn-primary">Get Started</a>
        </div>
    </nav>

    <!-- Main Hero Section -->
    <main class="hero">
        <div class="hero-content">
            <h1>Detect Spam Messages<br>Instantly Using AI</h1>
            <p>
                Keep your communication secure, Outsmart phishing attempts,<br>
                malicious links, and unwanted noise with automated,<br>
                high-precision text filtering.
            </p>
            <div class="hero-buttons">
                <a href="#" class="btn btn-primary">Try Now</a>
                <a href="#" class="btn btn-outline">Learn More</a>
            </div>
        </div>
        
        <div class="hero-image-container">
            <!-- Referencing the provided filename verbatim -->
            <img src="1000242082.jpg" alt="AI Shield Graphic">
        </div>
    </main>

</body>
</html>
