<!doctype html> 
<html lang="en"> 
  <head> 
    <meta charset="UTF-8" /> 
    <title>Update User</title> 
  </head> 
  <body> 
    <h2>Update User</h2> 
 
    <form method="POST"> 
      <label>Name:</label> 
      <input type="text" name="name" value="{{ user.name }}" required /> 
 
      <label>Email:</label> 
      <input type="email" name="email" value="{{ user.email }}" required /> 
 
      <button type="submit">Update</button> 
    </form> 
 
    <br /> 
 
    <a href="/">Back</a> 
  </body> 
</html>
